<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ksham — the patience to return</title>
    <style>
        /* --- DESIGN SYSTEM & CSS VARIABLES --- */
        :root {
            --bg-color: #F4F3EF;
            --text-color: #1A1A1A;
            --border-color: #A0A0A0;
            --accent-red: #C84B31;
            --accent-green: #4D774E;
            --font-mono: 'Courier New', Courier, Courier Prime, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            overflow: hidden;
            transition: background-color 0.2s ease;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid transparent;
            padding-bottom: 1rem;
        }

        .title {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: -0.5px;
            margin: 0 auto;
        }

        .nav-link {
            position: absolute;
            top: 2rem;
            font-size: 0.9rem;
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 2px;
        }

        .nav-link:hover {
            color: var(--accent-red);
            border-bottom-color: var(--accent-red);
        }

        .nav-left {
            left: 2rem;
        }

        .nav-right {
            right: 2rem;
        }

        main {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: stretch;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .split-line {
            width: 1px;
            height: 60%;
            background-color: var(--border-color);
            grid-column: 2;
            align-self: center;
        }

        .panel-left {
            grid-column: 1;
            padding-right: 4rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .timer-display {
            font-size: 5.5rem;
            font-weight: bold;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 1rem;
            font-variant-numeric: tabular-nums;
        }

        .presets-row {
            display: flex;
            gap: 0.5rem;
        }

        .btn-preset {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-preset:hover, .btn-preset.active {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-label {
            font-size: 0.9rem;
        }

        .goal-input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            color: var(--text-color);
            outline: none;
        }

        .warning-msg {
            font-size: 0.85rem;
            color: var(--accent-red);
            min-height: 1.2rem;
            visibility: hidden;
        }

        .btn-primary {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--text-color);
            cursor: pointer;
            text-align: center;
            margin-top: auto;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .btn-primary:disabled {
            border-color: #CCCCCC;
            color: #999999;
            cursor: not-allowed;
        }

        .panel-right {
            grid-column: 3;
            padding-left: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 2.5rem;
        }

        .state-indicator {
            font-size: 1.2rem;
            margin-top: auto;
        }

        .streak-panel {
            font-size: 1.5rem;
            font-weight: bold;
        }

        footer {
            display: flex;
            justify-content: center;
            font-size: 0.8rem;
            border-top: 1px solid transparent;
            padding-top: 1rem;
            color: #555555;
        }

        footer a {
            color: inherit;
            text-decoration: underline;
        }

        .support-buttons {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .support-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            padding: 0.6rem 0.9rem;
            text-decoration: none;
            opacity: 0.75;
            transition: opacity 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        }

        .support-link:hover {
            opacity: 1;
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(244, 243, 239, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            border: 1px solid var(--text-color);
            padding: 2.5rem;
            max-width: 450px;
            width: 90%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn-modal {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--text-color);
            cursor: pointer;
            text-align: center;
        }

        .btn-modal:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        body.crisis-mode {
            background-color: #120303;
            animation: pulse-red 2s infinite;
        }
        
        body.crisis-mode .timer-display,
        body.crisis-mode .state-indicator,
        body.crisis-mode .crisis-message {
            color: var(--accent-red) !important;
        }
        
        body.crisis-mode .btn-preset,
        body.crisis-mode .goal-input,
        body.crisis-mode .btn-primary {
            border-color: var(--accent-red) !important;
            color: var(--accent-red) !important;
            background-color: transparent !important;
        }

        body.flash-green {
            background-color: #E2EFE0 !important;
            transition: background-color 0.1s ease;
        }

        @keyframes pulse-red {
            0% { background-color: #120303; }
            50% { background-color: #280808; }
            100% { background-color: #120303; }
        }
        
        .crisis-message {
            font-weight: bold;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        @media (max-width: 768px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-x: hidden;
                overflow-y: auto;
                padding: 1.25rem;
            }

            header {
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.75rem 1.5rem;
                padding-bottom: 1.25rem;
            }

            .title {
                order: -1;
                flex-basis: 100%;
                text-align: center;
                margin: 0;
            }

            .nav-link {
                position: static;
                top: auto;
                left: auto;
                right: auto;
            }

            main {
                grid-template-columns: 1fr;
                gap: 2.5rem;
                margin-top: 2rem;
            }

            .split-line {
                display: none;
            }

            .panel-left {
                grid-column: 1;
                padding-right: 0;
            }

            .panel-right {
                grid-column: 1;
                padding-left: 0;
                align-items: flex-start;
                text-align: left;
            }

            .state-indicator {
                margin-top: 0;
            }

            .btn-primary {
                margin-top: 0.5rem;
            }

            .timer-display {
                font-size: 4rem;
            }

            .support-buttons {
                bottom: 1rem;
                right: 1rem;
            }

            footer {
                margin-top: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="blog.html" class="nav-link nav-left">blog</a>
        <div class="title">Ksham — the patience to return</div>
        <a href="how.html" class="nav-link nav-right">how it works</a>
    </header>

    <main>
        <section class="panel-left">
            <div class="timer-container">
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="presets-row">
                    <button class="btn-preset" onclick="setPreset(5, event)">5m</button>
                    <button class="btn-preset active" onclick="setPreset(25, event)">25m</button>
                    <button class="btn-preset" onclick="setPreset(45, event)">45m</button>
                    <button class="btn-preset" onclick="setPreset(60, event)">60m</button>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label" for="goalInput"> What's the one thing you'll do right now?</label>
                <input type="text" id="goalInput" class="goal-input" placeholder="...">
                <div id="warningMsg" class="warning-msg">Warning: Type your goal first</div>
            </div>

            <button id="startBtn" class="btn-primary" onclick="startFocusSession()">Start Focus</button>
        </section>

        <div class="split-line"></div>

        <section class="panel-right">
            <div class="state-indicator" id="stateIndicator">State: Idle</div>

            <div class="streak-panel" id="streakDisplay">
                Streak: 0 sessions <span style="font-size: 0.9rem; font-weight: normal; display: block; margin-top: 0.25rem;">of honest focus</span>
            </div>

            <button class="btn-primary" onclick="openModal('endModal')">End Focus</button>
        </section>
    </main>

    <footer>
        <div><a href="#" id="feedbackLink" target="_blank">pls share feedback</a></div>
    </footer>

    <div class="support-buttons">
        <a href="support.html" class="support-link" title="Support Ksham">&#127861; Buy me a chai</a>
    </div>

    <div id="volumeModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">Volume Warning</div>
            <p>Ksham uses sound.</p>
            <button class="btn-modal" onclick="closeModal('volumeModal', true)">I Understand</button>
        </div>
    </div>

    <div id="endModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">Session Complete</div>
            <p>Did you actually do it?</p>
            <div class="modal-buttons">
                <button class="btn-modal" onclick="processSessionOutcome(true)">Yes</button>
                <button class="btn-modal" onclick="processSessionOutcome(false)">No</button>
            </div>
        </div>
    </div>

    <script>
        // --- MACHINE STATE SYSTEM ---
        let timerInterval = null;
        let timeRemaining = 1500;
        let initialDuration = 1500;
        let isActive = false;
        let isPaused = false;
        let currentGoal = "";
        let currentStreak = parseInt(localStorage.getItem('ksham_streak') || '0');
        let crisisAudio = null;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        document.addEventListener("DOMContentLoaded", () => {
            updateStreakDisplay();
            checkFirstTimeVolumeWarning();
            loadPersistedSession();
            document.getElementById('feedbackLink').href = 'https://docs.google.com/forms/d/e/1FAIpQLScw3n5mXoEOjk8p1olmKfK-iCrOWf_3lHK901HCL-U_wNltdg/viewform';
            
            // Preload crisis audio in background
            initCrisisAudio();

            // Prime the audio on the first user interaction so there's no
            // playback delay when the tab loses focus later.
            setupAudioPriming();
        });

        let audioPrimed = false;

        function setupAudioPriming() {
            const events = ['pointerdown', 'keydown', 'touchstart', 'click'];
            const handler = () => {
                primeCrisisAudio();
                if (audioPrimed) {
                    events.forEach(evt => window.removeEventListener(evt, handler));
                }
            };
            events.forEach(evt => window.addEventListener(evt, handler));
        }

        function primeCrisisAudio() {
            if (audioPrimed) return;
            resumeAudioContext();
            const audio = initCrisisAudio();
            audio.muted = true;
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                    audio.muted = false;
                    audioPrimed = true;
                }).catch(() => {
                    audio.muted = false;
                });
            }
        }

        function updateStreakDisplay() {
            const sessionLabel = currentStreak === 1 ? 'session' : 'sessions';
            document.getElementById('streakDisplay').innerHTML = `Streak: ${currentStreak} ${sessionLabel} <span style="font-size: 0.9rem; font-weight: normal; display: block; margin-top: 0.25rem;">of honest focus</span>`;
        }

        function checkFirstTimeVolumeWarning() {
            if (!localStorage.getItem('ksham_sound_warning')) {
                openModal('volumeModal');
            }
        }
        
        function resumeAudioContext() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function setPreset(minutes, event) {
            if (isActive) return;
            initialDuration = minutes * 60;
            timeRemaining = initialDuration;
            updateTimerUI();
            
            document.querySelectorAll('.btn-preset').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) {
                event.target.classList.add('active');
            }
        }

        function updateTimerUI() {
            const mins = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const secs = (timeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${mins}:${secs}`;
        }

        // --- FIXED AUDIO ENGINE with crisis.mp3 ---
        function initCrisisAudio() {
            if (!crisisAudio) {
                crisisAudio = new Audio();
                crisisAudio.loop = true;
                crisisAudio.preload = 'auto';
                crisisAudio.src = 'crisis.mp3';
                crisisAudio.load();
                
                crisisAudio.addEventListener('canplaythrough', () => {
                    console.log('Audio loaded and ready');
                });
                
                crisisAudio.addEventListener('error', (e) => {
                    console.error('Audio loading error:', e);
                    console.log('Make sure crisis.mp3 is in the same folder');
                });
            }
            return crisisAudio;
        }
        
        function startCrisisAlarm() {
            if (!isActive) return;
            
            try {
                resumeAudioContext();
                const audio = initCrisisAudio();
                audio.currentTime = 0;
                
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(e => {
                        console.log('Play error:', e);
                    });
                }
            } catch(e) { 
                console.log('Audio error:', e); 
            }
        }

        function stopCrisisAlarm() {
            if (crisisAudio) {
                crisisAudio.pause();
                crisisAudio.currentTime = 0;
            }
        }

        function startCountdown() {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                if (!isActive || isPaused) return;
                
                if (timeRemaining <= 1) {
                    endSessionReached();
                } else {
                    timeRemaining--;
                    updateTimerUI();
                    saveSessionState();
                }
            }, 1000);
        }
        
        function pauseCountdown() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function resumeCountdown() {
            if (isActive && !isPaused && !timerInterval) {
                startCountdown();
            }
        }

        function startFocusSession(restored = false) {
            const input = document.getElementById('goalInput');
            const warning = document.getElementById('warningMsg');
            
            resumeAudioContext();

            if (!restored) {
                if (!input.value.trim()) {
                    warning.style.visibility = "visible";
                    return;
                }
                warning.style.visibility = "hidden";
                currentGoal = input.value.trim();
            } else {
                input.value = currentGoal;
            }

            isActive = true;
            isPaused = false;
            
            document.getElementById('startBtn').innerText = "Focusing...";
            document.getElementById('startBtn').disabled = true;
            input.disabled = true;
            document.getElementById('stateIndicator').innerHTML = `State: Focusing on ${currentGoal}`;

            window.addEventListener('beforeunload', preventTabClose);
            
            startCountdown();
            saveSessionState();
        }

        document.addEventListener("visibilitychange", () => {
            if (!isActive) return;

            if (document.hidden) {
                isPaused = true;
                pauseCountdown();
                startCrisisAlarm();
                document.getElementById('stateIndicator').innerHTML = '<span class="crisis-message">⚠️ CRISIS — FIX THE ENGINES ⚠️</span>';
                document.body.classList.add('crisis-mode');
            } else if (isPaused) {
                stopCrisisAlarm();
                isPaused = false;
                document.body.classList.remove('crisis-mode');
                document.body.classList.add('flash-green');
                document.getElementById('stateIndicator').innerHTML = " Engines fixed. Back to focus.";

                setTimeout(() => {
                    document.body.classList.remove('flash-green');
                    document.getElementById('stateIndicator').innerHTML = `State: Focusing on ${currentGoal}`;
                }, 1500);

                resumeCountdown();
                saveSessionState();
            }
        });

        function saveSessionState() {
            if (isActive) {
                localStorage.setItem('ksham_session', JSON.stringify({
                    timeRemaining: timeRemaining,
                    isActive: isActive,
                    isPaused: isPaused,
                    currentGoal: currentGoal,
                    initialDuration: initialDuration
                }));
            }
        }

        function loadPersistedSession() {
            const data = localStorage.getItem('ksham_session');
            if (data) {
                const session = JSON.parse(data);
                if (session.isActive && session.timeRemaining > 0) {
                    timeRemaining = session.timeRemaining;
                    initialDuration = session.initialDuration;
                    currentGoal = session.currentGoal;
                    isPaused = session.isPaused || false;
                    
                    document.getElementById('goalInput').value = currentGoal;
                    updateTimerUI();
                    
                    const minutes = initialDuration / 60;
                    document.querySelectorAll('.btn-preset').forEach(btn => {
                        if (parseInt(btn.innerText) === minutes) {
                            btn.classList.add('active');
                        } else {
                            btn.classList.remove('active');
                        }
                    });
                    
                    startFocusSession(true);
                    
                    if (isPaused) {
                        pauseCountdown();
                        document.body.classList.add('crisis-mode');
                        document.getElementById('stateIndicator').innerHTML = '<span class="crisis-message">⚠️ CRISIS — FIX THE ENGINES ⚠️</span>';
                    }
                }
            }
        }

        function clearPersistedSession() {
            localStorage.removeItem('ksham_session');
        }

        function preventTabClose(e) {
            e.preventDefault();
            e.returnValue = 'Focus session in progress. Leave anyway?';
        }

        function showConfetti() {
            const canvas = document.createElement('canvas');
            canvas.id = 'confetti-canvas';
            document.body.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const particles = [];
            const colors = ['#4ade80', '#60a5fa', '#fbbf24', '#f87171', '#c084fc', '#f472b6', '#34d399', '#a78bfa'];
            
            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 10 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: Math.random() * 6 + 3,
                    rotation: Math.random() * 360,
                    spin: (Math.random() - 0.5) * 15,
                    wobble: Math.random() * Math.PI * 2,
                    wobbleSpeed: Math.random() * 0.1 + 0.05
                });
            }
            
            let animationId;
            let startTime = Date.now();
            
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let allFinished = true;
                for (let p of particles) {
                    if (p.y < canvas.height) {
                        allFinished = false;
                        p.y += p.speed;
                        p.wobble += p.wobbleSpeed;
                        p.x += Math.sin(p.wobble) * 1.5;
                        p.rotation += p.spin;
                        
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rotation * Math.PI / 180);
                        ctx.fillStyle = p.color;
                        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
                        ctx.restore();
                    }
                }
                
                if (allFinished || Date.now() - startTime > 4000) {
                    cancelAnimationFrame(animationId);
                    document.body.removeChild(canvas);
                } else {
                    animationId = requestAnimationFrame(draw);
                }
            }
            
            draw();
        }
        
        function showEncouragement() {
            const existing = document.getElementById('encouragement-overlay');
            if (existing) existing.remove();
            
            const overlay = document.createElement('div');
            overlay.id = 'encouragement-overlay';
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.backgroundColor = 'rgba(0,0,0,0.85)';
            overlay.style.zIndex = '10000';
            overlay.style.display = 'flex';
            overlay.style.justifyContent = 'center';
            overlay.style.alignItems = 'center';
            overlay.style.cursor = 'pointer';
            
            const msgBox = document.createElement('div');
            msgBox.style.background = '#1A1A1A';
            msgBox.style.border = '2px solid #C84B31';
            msgBox.style.padding = '2.5rem 3.5rem';
            msgBox.style.borderRadius = '16px';
            msgBox.style.textAlign = 'center';
            msgBox.style.fontFamily = 'monospace';
            msgBox.style.boxShadow = '0 20px 60px rgba(0,0,0,0.5)';
            msgBox.style.animation = 'fadeInScale 0.3s ease-out';
            msgBox.innerHTML = `
                <div style="font-size: 4rem; margin-bottom: 1rem;">💪</div>
                <div style="font-size: 1.5rem; color: #C84B31; margin-bottom: 0.75rem; font-weight: bold;">It's okay.</div>
                <div style="font-size: 1.1rem; color: #E0E0E0; margin-bottom: 1.5rem;">You can do this. Try again.<br>That's why we're here.</div>
                <div style="font-size: 0.85rem; color: #888888; border-top: 1px solid #333; padding-top: 1rem; margin-top: 0.5rem;">Click anywhere to continue</div>
            `;
            
            overlay.appendChild(msgBox);
            document.body.appendChild(overlay);
            
            if (!document.getElementById('encouragement-animation')) {
                const style = document.createElement('style');
                style.id = 'encouragement-animation';
                style.textContent = `
                    @keyframes fadeInScale {
                        0% { opacity: 0; transform: scale(0.9); }
                        100% { opacity: 1; transform: scale(1); }
                    }
                `;
                document.head.appendChild(style);
            }
            
            overlay.addEventListener('click', () => {
                overlay.remove();
            });
        }

        function endSessionReached() {
            clearInterval(timerInterval);
            timerInterval = null;
            stopCrisisAlarm();
            window.removeEventListener('beforeunload', preventTabClose);
            openModal('endModal');
        }

        function processSessionOutcome(success) {
            if (success) {
                currentStreak += 1;
                showConfetti();
            } else {
                currentStreak = 0;
                showEncouragement();
            }
            localStorage.setItem('ksham_streak', currentStreak);
            updateStreakDisplay();
            resetMachineToIdle();
            closeModal('endModal');
        }

        function resetMachineToIdle() {
            isActive = false;
            isPaused = false;
            stopCrisisAlarm();
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            clearPersistedSession();
            timeRemaining = initialDuration;
            updateTimerUI();
            
            document.getElementById('startBtn').innerText = "Start Focus";
            document.getElementById('startBtn').disabled = false;
            document.getElementById('goalInput').disabled = false;
            document.getElementById('goalInput').value = "";
            document.getElementById('stateIndicator').innerHTML = "State: Idle";
            document.body.classList.remove('crisis-mode', 'flash-green');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id, setWarningFlag = false) {
            document.getElementById(id).classList.remove('active');
            if (setWarningFlag) {
                localStorage.setItem('ksham_sound_warning', 'true');
            }
        }
    </script>
</body>
</html>
